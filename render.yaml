services:
  - type: web
    name: ai-cs-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: API_KEY
        sync: false
      - key: API_BASE
        sync: false
      - key: MODEL
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: RETRIEVAL_ALPHA
        sync: false
